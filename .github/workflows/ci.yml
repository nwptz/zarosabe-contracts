name: CI

on:
    push:
        branches: ["main", "master"]
    pull_request:

jobs:
    checks:
        runs-on: ubuntu-latest
        steps:
            - name: Checkout
              uses: actions/checkout@v4

            - name: Setup Node
              uses: actions/setup-node@v4
              with:
                  node-version: "20"
                  cache: "npm"

            - name: Install npm dependencies
              run: npm ci

            - name: Setup Foundry
              uses: foundry-rs/foundry-toolchain@v1
              with:
                  version: stable

            - name: Install OpenZeppelin
              run: forge install OpenZeppelin/openzeppelin-contracts

            - name: Format check
              run: npm run format:check

            - name: Lint
              run: npm run lint

            - name: Build
              run: forge build

            - name: Test
              run: forge test -vv
